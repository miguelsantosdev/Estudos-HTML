<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css Flex Box Module - Center </title>
    <style>
        /*RESET*/ * {
                        margin: 0px;
                        padding: 0px;
                        box-sizing: border-box;
                    }

                body {
                    background-color: chocolate;
                  }  
                main {
                    background-color: indianred;
                    color: azure;
                    width: 80vw;
                    height: 80vh;

                    /*UTILIZANDO O FLEX NO 'PAI' PARA CENTRALIZAR O FILHO 'SECTION ' */

                    display: flex;
                    flex-flow:  row nowrap;
                    justify-content: center;
                    align-items: center;
                    text-align: center;
                    text-shadow: 2px 2px 2px rgb(255, 143, 15);

                }
                section{
                    width: 60vw;
                    height: 60vh;
                    background-color: crimson;
                    padding: 10px;
                }
    </style>
</head>
<body>
    <title> F L E X   B O X   C E N T R A L I Z A D O </title>
    
    <main>
        <section>
            <h1> F L E X   B O X   C E N T R A L I Z A D O </h1>
            <br>
            <br>
                <h1>Tela de Login</h1>
        </section>
    </main>
</body>
</html>
