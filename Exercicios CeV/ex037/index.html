<!-- JUSTIFY CONTENT / FLEX-FLOW - MAIN-AXIS -->

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLEXBOX02</title>
    <style>
        div.container{
            display: flex;
            height: 120px;
            align-items: center;
            background-color: rgb(240, 145, 4);
            flex-flow: row nowrap;
            justify-content: space-evenly;
            /*flex-direction: row-reverse;
            flex-wrap: wrap-reverse; */ 
        }

        div.item{   
            background-color: rgb(243, 219, 4);
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item">Exemplo de bloco A</div>
        <div class="item">Exemplo de bloco B</div>
        <div class="item">Exemplo de bloco C</div>
        <div class="item">Exemplo de bloco D</div>
        <div class="item">Exemplo de bloco E</div>
        <div class="item">Exemplo de bloco F</div>
    </div>
</body>
</html>
