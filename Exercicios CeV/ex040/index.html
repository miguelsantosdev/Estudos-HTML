<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>FLEXBOX - ORDER</title>
    <style>
        div.container{
            display: flex;
            background-color: purple;
            flex-flow: row wrap;
            height: 150px;
            
        }

        div.item{
            background-color: orchid;
            border: 1px solid black;
            text-align: center;
            padding: 30px;

        }

        div#i1{
            align-self: flex-start;
        }

        div#i2{
            align-self: baseline;
        }

        div#i3{
           align-self: flex-end
        }

        div#i4{
            align-self: self-end;
        }

        div#i5{
            align-self: center;
        }

        div#i6{
            align-self: stretch;
        }


        div#i7{
            align-self: center;
        }


        div#i8{

        }

        div#i9{

        }

    </style>
</head>
<body>
    <div class="container">
        <div class="item" style = "order: +4;" id="i1">A</div>
        <div class="item" id="i2">B</div>
        <div class="item" style = "order: -2;" id="i3">C</div> 
        <div class="item" id="i4">D</div>
        <div class="item" id="i5">E</div>
        <div class="item" id="i6">F</div>
        <div class="item" id="i7">G</div>
        <div class="item" id="i8">H</div>
        <div class="item" id="i9" style = "order: -4;">I</div>
    </div>
</body>
</html>
