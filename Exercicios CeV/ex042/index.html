<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLEX-ITEM</title>
    <style>
        div.container{
            display: flex;
            background-color: orangered;
            flex-flow: row nowrap;
            height: 500px; 
        }

        div.item{
            background-color: blue;
            border: 1px solid black;
            padding: 10px;
            text-align: center;
            padding: 50px;
            color: aliceblue;
            flex-basis: 250px;
            flex-shrink: 1;
            flex-grow: 1;
        }

        div#cxA{
           flex-grow: 0;
           flex-shrink: 1;
           flex-basis: 450px; 
        }
        div#cxB{
            flex-grow: 1;
            flex-shrink: 0;
            flex-basis: 150px;
        }
        div#cxC{
            flex-grow: 0;
            flex-shrink: 2;
            flex-basis: 350px;   
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="item" id="cxA">A</div>
        <div class="item" id="cxB">B</div>
        <div class="item" id="cxC">C</div>
    </div>
</body>
</html>
